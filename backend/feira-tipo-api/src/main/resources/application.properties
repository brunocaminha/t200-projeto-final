spring.application.name=feira-tipo-api

server.port=8080

# Banco H2 em memoria
spring.datasource.url=jdbc:h2:mem:feiratipodb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console do H2 em /h2-console
spring.h2.console.enabled=true

# Swagger UI em /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html

# Log em arquivo (mantem no console e grava em disco)
logging.file.name=logs/feira-tipo-api.log
logging.level.root=INFO

logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=200MB
